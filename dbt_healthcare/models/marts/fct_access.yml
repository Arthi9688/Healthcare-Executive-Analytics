version: 2

models:
  - name: fct_access

    description: >
      One row per eligible new appointment with access wait days
      and administrative days information.

    semantic_model:
      enabled: true

    agg_time_dimension: appointment_made_date

    config:
      meta:
        joins:
          - join: dim_department
            sql_on: ${fct_access.department_id} = ${dim_department.department_id}

          - join: dim_provider
            sql_on: ${fct_access.provider_id} = ${dim_provider.provider_id}

        metrics:
          appointments_meeting_14_wait_days_pct:
            type: number
            label: Appointments Meeting 14 Wait Days %
            description: >
              Percentage of appointments meeting the 14-day wait standard.
            sql: >
              ${appointments_meeting_14_wait_days}
              / NULLIF(${appointments_with_wait_days}, 0)
            format: "0.0%"

          appointments_meeting_7_admin_days_pct:
            type: number
            label: Appointments Meeting 7 Admin Days %
            description: >
              Percentage of appointments meeting the 7-day administrative standard.
            sql: >
              ${appointments_meeting_7_admin_days}
              / NULLIF(${appointments_with_admin_days}, 0)
            format: "0.0%"

    columns:

      # =====================================================
      # Entities
      # =====================================================

      - name: appointment_id
        description: Unique identifier for the appointment.

        entity:
          name: appointment_id
          type: primary

        config:
          meta:
            metrics:
              appointment_count:
                type: count_distinct
                label: Appointment Count
                description: Distinct count of eligible appointments.

        data_tests:
          - not_null
          - unique

      - name: patient_id
        description: Patient associated with the appointment.

        entity:
          name: patient_id
          type: foreign

        data_tests:
          - not_null

      - name: patient_encounter_id
        description: Encounter associated with the appointment.

        entity:
          name: patient_encounter_id
          type: foreign

      - name: provider_id
        description: Provider associated with the appointment.

        entity:
          name: provider_id
          type: foreign

        data_tests:
          - not_null

      - name: department_id
        description: Department associated with the appointment.

        entity:
          name: department_id
          type: foreign

        data_tests:
          - not_null

      - name: referral_id
        description: Referral associated with the appointment.

        entity:
          name: referral_id
          type: foreign

      # =====================================================
      # Time Dimensions
      # =====================================================

      - name: appointment_made_date
        description: Date the appointment was scheduled.

        dimension:
          type: time

        granularity: day

        data_tests:
          - not_null

      - name: appointment_date
        description: Date of the scheduled appointment.

        dimension:
          type: time

        granularity: day

      - name: referral_entry_date
        description: Date the referral was entered.

        dimension:
          type: time

        granularity: day

      - name: month_begin_date
        description: First day of the reporting month.

        dimension:
          type: time

        granularity: month

      - name: month_end_date
        description: Last day of the reporting month.

        dimension:
          type: time

        granularity: month

      - name: refresh_date
        description: Date this row was last refreshed.

        dimension:
          type: time

        granularity: day

      # =====================================================
      # Categorical Dimensions
      # =====================================================

      - name: scheduled_online
        description: Indicates whether the appointment was scheduled online.

        dimension:
          type: categorical

      - name: visit_type_category
        description: Grouped visit type category.

        dimension:
          type: categorical

      - name: visit_type_id
        description: Identifier for the visit type.

        dimension:
          type: categorical

      - name: visit_type
        description: Appointment visit type.

        dimension:
          type: categorical

      - name: new_to_enterprise
        description: Indicates whether the patient is new to the enterprise.

        dimension:
          type: categorical

      - name: new_to_division
        description: Indicates whether the patient is new to the division.

        dimension:
          type: categorical

      - name: calendar_year
        description: Calendar year.

        dimension:
          type: categorical

        config:
          meta:
            dimension:
              label: Calendar Year

      - name: fiscal_year
        description: Fiscal year.

        dimension:
          type: categorical

        config:
          meta:
            dimension:
              label: Fiscal Year

      - name: month_name_short
        description: Three-letter month abbreviation.

        dimension:
          type: categorical

        config:
          meta:
            dimension:
              label: Month

      - name: month_number
        description: Calendar month number from 1 through 12.

        dimension:
          type: categorical

        config:
          meta:
            dimension:
              label: Month Number

      - name: month_year
        description: Month and year label, such as Jan-2026.

        dimension:
          type: categorical

      - name: year_month
        description: Sortable year-month key, such as 2026-01.

        dimension:
          type: categorical

      - name: year_month_sequence
        description: Sequential integer used for year-month ordering.

        dimension:
          type: categorical

        config:
          meta:
            dimension:
              label: Year Month Sequence

      - name: chart_period
        description: >
          Relative reporting period based on the current calendar year.
          Values are Current Year, Prior Year, or Other.

        dimension:
          type: categorical

        config:
          meta:
            dimension:
              label: Chart Period

      # =====================================================
      # Raw Source Fields
      # =====================================================

      - name: source_wait_days
        description: Wait days as originally sourced before recalculation.

      - name: source_admin_days
        description: Administrative days as originally sourced before recalculation.

      # =====================================================
      # Access Metric Inputs
      # =====================================================

      - name: meets_14_wait_days_flag
        description: >
          One when the appointment met the 14-day wait standard;
          otherwise zero.

        config:
          meta:
            metrics:
              appointments_meeting_14_wait_days:
                type: sum
                label: Appointments Meeting 14 Wait Days
                description: >
                  Number of appointments with calculated wait days
                  of 14 days or less.

      - name: wait_days_denominator_flag
        description: >
          One when the appointment has a valid calculated wait-days value;
          otherwise zero.

        config:
          meta:
            metrics:
              appointments_with_wait_days:
                type: sum
                label: Appointments With Wait Days
                description: >
                  Number of appointments with a valid calculated
                  wait-days value.

      - name: meets_7_admin_days_flag
        description: >
          One when the appointment met the 7-day administrative standard;
          otherwise zero.

        config:
          meta:
            metrics:
              appointments_meeting_7_admin_days:
                type: sum
                label: Appointments Meeting 7 Admin Days
                description: >
                  Number of appointments with calculated administrative days
                  of 7 days or less.

      - name: admin_days_denominator_flag
        description: >
          One when the appointment has valid calculated administrative days;
          otherwise zero.

        config:
          meta:
            metrics:
              appointments_with_admin_days:
                type: sum
                label: Appointments With Admin Days
                description: >
                  Number of appointments with a valid calculated
                  administrative-days value.

      - name: calculated_wait_days
        description: >
          Calculated number of days between the appointment scheduling date
          and the appointment date.

        config:
          meta:
            metrics:
              median_wait_days:
                type: median
                label: Median Wait Days
                description: >
                  Median calculated wait days for eligible appointments.

              average_wait_days:
                type: average
                label: Average Wait Days
                description: >
                  Average calculated wait days for eligible appointments.

      - name: calculated_admin_days
        description: >
          Calculated number of days between referral entry and
          the appointment scheduling date.

        config:
          meta:
            metrics:
              median_admin_days:
                type: median
                label: Median Admin Days
                description: >
                  Median calculated administrative days for eligible appointments.

              average_admin_days:
                type: average
                label: Average Admin Days
                description: >
                  Average calculated administrative days for eligible appointments.
