version: 2

models:
  - name: fct_productivity

    semantic_model:
      enabled: true

    agg_time_dimension: month_begin_date

    description: >
      One row per provider per department per month with productivity
      information.

    columns:

      # -------------------------
      # Entities
      # -------------------------

      - name: provider_id
        description: Provider identifier.
        entity:
          name: provider_id
          type: primary
        config:
          meta:
            metrics:
              provider_count:
                type: count_distinct
                label: Provider Count
                description: Distinct count of providers.
        data_tests:
          - not_null

      - name: department_id
        description: Department identifier.
        entity:
          name: department_id
          type: foreign
        data_tests:
          - not_null

      # -------------------------
      # Time Dimensions
      # -------------------------

      - name: month_begin_date
        description: Beginning of the reporting month.
        granularity: month
        dimension:
          type: time
        data_tests:
          - not_null

      - name: month_end_date
        description: End of the reporting month.
        granularity: month
        dimension:
          type: time

      # -------------------------
      # Categorical Dimensions
      # -------------------------

      - name: calendar_year
        description: Calendar year.
        dimension:
          type: categorical

      - name: month_name_short
        description: Three-letter month abbreviation.
        config:
          meta:
            dimension:
              label: Month

      - name: month_number
        description: Calendar month number from 1 through 12.
        config:
          meta:
            dimension:
              label: Month Number
          
      - name: chart_period
        description: >
          Relative reporting period based on the current calendar year.
          Values are Current Year, Prior Year, or Other.
        config:
          meta:
            dimension:
              label: Chart Period
              
      - name: fiscal_year
        description: Fiscal year.
        dimension:
          type: categorical

      # -------------------------
      # Metric Columns
      # -------------------------

      - name: percent_patient_facing
        description: Percentage of provider hours that are patient-facing.
        dimension:
          type: categorical
        config:
          meta:
            metrics:
              total_patient_facing_percent:
                type: sum
                label: Total Patient Facing Percent
                description: Sum of patient-facing percentages.

              average_patient_facing_percent:
                type: average
                label: Average Patient Facing Percent
                description: Average patient-facing percentage.

      - name: meets_80_percent_flag
        description: Indicates whether the provider met the 80% target.
        dimension:
          type: categorical
        config:
          meta:
            metrics:
              providers_meeting_80_percent:
                type: sum
                label: Providers Meeting 80 Percent
                description: Number of provider rows meeting the target.

      - name: patient_facing_denominator_flag
        description: Indicates whether the provider has valid patient-facing data.
        dimension:
          type: categorical
        config:
          meta:
            metrics:
              providers_with_patient_facing:
                type: sum
                label: Providers With Patient Facing Data
                description: Number of providers with valid patient-facing data.

    # --------------------------------------------------
    # dbt Semantic Layer Metrics
    # --------------------------------------------------

    metrics:

      - name: total_patient_facing_percent
        label: Total Patient Facing Percent
        description: Sum of patient-facing percentages.
        type: simple
        agg: sum
        expr: percent_patient_facing
        format: percent

      - name: provider_count
        label: Provider Count
        description: Distinct count of providers.
        type: simple
        agg: count_distinct
        expr: provider_id

      - name: providers_meeting_80_percent
        label: Providers Meeting 80 Percent
        description: Number of provider rows meeting the 80% target.
        type: simple
        agg: sum
        expr: meets_80_percent_flag
        format: percent

      - name: providers_with_patient_facing
        label: Providers With Patient Facing Data
        description: Number of provider rows with valid patient-facing information.
        type: simple
        agg: sum
        expr: patient_facing_denominator_flag
        format: percent


# --------------------------------------------------
# Advanced dbt Semantic Metrics
# --------------------------------------------------

metrics:

  - name: average_patient_facing_percent
    label: Average Patient Facing Percent
    description: Average patient-facing percentage across providers.
    type: ratio
    numerator: total_patient_facing_percent
    denominator: providers_with_patient_facing
    format: percent

  - name: providers_meeting_80_percent_pct
    label: Providers Meeting ≥80% Patient Facing Hours
    description: Percentage of providers meeting the 80% patient-facing target.
    type: ratio
    numerator: providers_meeting_80_percent
    denominator: providers_with_patient_facing
    format: percent
