version: 2

models:
  - name: fct_productivity
    description: >
      One row per provider per department per month with productivity information.

    semantic_model:
      enabled: true

    agg_time_dimension: month_begin_date

    config:
      meta:
        joins:
          - join: dim_department
            sql_on: ${fct_productivity.department_id} = ${dim_department.department_id}

          - join: dim_provider
            sql_on: ${fct_productivity.provider_id} = ${dim_provider.provider_id}

    columns:

      # =====================================================
      # Entities
      # =====================================================

      - name: provider_id
        description: Provider identifier.
        entity:
          name: provider_id
          type: primary

        config:
          meta:
            metrics:
              provider_count:
                type: count_distinct
                label: Provider Count

        data_tests:
          - not_null

      - name: department_id
        description: Department identifier.
        entity:
          name: department_id
          type: foreign

        data_tests:
          - not_null

      # =====================================================
      # Time Dimensions
      # =====================================================

      - name: month_begin_date
        description: Beginning of reporting month.
        dimension:
          type: time
        granularity: month

        data_tests:
          - not_null

      - name: month_end_date
        description: End of reporting month.
        dimension:
          type: time
        granularity: month

      - name: refresh_date
        description: Refresh date.
        dimension:
          type: time
        granularity: day

      # =====================================================
      # Categorical Dimensions
      # =====================================================

      - name: calendar_year

      - name: fiscal_year

      - name: month_name_short

      - name: month_number

      - name: month_year

      - name: year_month

      - name: year_month_sequence

      - name: chart_period

      # =====================================================
      # Numeric Fields
      # =====================================================

      - name: clinical_fte

        config:
          meta:
            metrics:

              total_clinical_fte:
                type: sum
                label: Total Clinical FTE

              average_clinical_fte:
                type: average
                label: Average Clinical FTE

      - name: business_days_in_month

        config:
          meta:
            metrics:

              average_business_days:
                type: average
                label: Average Business Days

      - name: regular_available_hours

        config:
          meta:
            metrics:

              total_regular_available_hours:
                type: sum
                label: Total Regular Available Hours

      - name: source_expected_patient_facing_hours

        config:
          meta:
            metrics:

              total_expected_patient_facing_hours:
                type: sum
                label: Expected Patient Facing Hours

      # =====================================================
      # Productivity Metrics
      # =====================================================

      - name: percent_patient_facing

        description: Patient-facing percentage stored as decimal.

        config:
          meta:
            metrics:

              average_patient_facing_percent:
                type: average
                label: Average Patient Facing %
                format: "0.0%"

      - name: meets_80_percent_flag

        description: 1 when provider meets 80% target.

        config:
          meta:
            metrics:

              providers_meeting_80_percent:
                type: sum
                label: Providers Meeting ≥80%

      - name: patient_facing_denominator_flag

        description: Denominator for patient-facing percentage.

        config:
          meta:
            metrics:

              providers_with_patient_facing:
                type: sum
                label: Providers With Patient Facing Data
